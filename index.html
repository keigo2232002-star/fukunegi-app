<!DOCTYPE html>
<html lang="ja">
<head>
<link rel="manifest" href="manifest.json">
<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js");
  }
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>福ねぎ出荷数量計算システム</title>

<style>
  body { font-family: sans-serif; padding: 20px; background:#e8f5e9; }
  h2 { font-size: 22px; margin-bottom: 10px; }
  .section { margin-bottom: 25px; }
  .label { font-size: 20px; display: block; margin-bottom: 5px; }
  input[type="number"] {
    width: 20%;
    padding: 14px;
    font-size: 22px;
    margin-bottom: 15px;
    border-radius: 8px;
    border: 1px solid #ccc;
  }
  .weekday-btn {
    font-size: 20px;
    padding: 12px 0;
    width: 18%;
    margin-right: 2%;
    margin-bottom: 10px;
    border-radius: 8px;
    border: none;
    background: #ddd;
  }
  .weekday-btn.active {
    background: #43a047;
    color: white;
  }
  .dest-row {
    background: white;
    border-left: 6px solid #66bb6a;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 8px;
    font-size: 20px;
  }
  .dest-input {
    width: 30%;
    padding: 10px;
    font-size: 20px;
    margin-left: 5px;
  }
</style>
</head>
<body>

<img src="シュッカー.png" alt="システムロゴ"
     style="width:100%; max-width:500px; display:block; margin:0 auto 20px;">

<h2>① 入荷数量</h2>
<div class="section">

  <label class="label">630数量(これは確定値ですね)</label>
  <input type="number" id="r630Input" value="0" oninput="calcTotal()">

  <label class="label">○調数量(これは予想値です）</label>
  <input type="number" id="choInput" value="0" oninput="calcTotal()">

  <label class="label">合計入荷数量</label>
  <div id="productionQty" style="font-size:26px; font-weight:bold;">0</div>

 </div>
 
 <h2>② 前日からの繰り越し数量</h2>
<div class="section">

  <label class="label">前日からの繰り越し数量</label>
  <input type="number" id="kurikoshiInput" value="0" oninput="calcTotal()">

   </div>

<h2>③ 繰り越し希望数量</h2>
<div class="section">
  <label class="label">翌日以降に持ち越したい（貯金したい）数量</label>
  <input type="number" id="carryInput" value="0" oninput="calcTotal()">
</div>

<h2>④　出荷可能数量</h2>
<div class="section">
  <label class="label">出荷可能数量（合計 ＋前日からの繰り越し数量　− 翌日以降への繰り越し数量）</label>
  <div id="displayShippable" style="font-size:26px; font-weight:bold;">0</div>
</div>

<h2>⑤ 今日は何曜日？</h2>
<div id="destArea" class="section" style="font-size:20px;">
  曜日を選んでください
</div>

<div id="weekdayArea" class="section">
  <button class="weekday-btn" onclick="selectDay('mon', this)">月</button>
  <button class="weekday-btn" onclick="selectDay('tue', this)">火</button>
  <button class="weekday-btn" onclick="selectDay('wed', this)">水</button>
  <button class="weekday-btn" onclick="selectDay('thu', this)">木</button>
  <button class="weekday-btn" onclick="selectDay('fri', this)">金</button>
</div>

<h2>⑤ 残数量</h2>
<div class="section">
  <div id="leftoverQty" style="font-size:26px; font-weight:bold; color:#c62828;">0</div>
  <div id="errorMsg" style="font-size:20px; color:#c62828; margin-top:10px;"></div>
</div>

<div id="totalshippableQty" style="display:none;">0</div>

<script>
// 入荷数量計算
function calcTotal() {
  const cho = Number(document.getElementById("choInput").value);
  const r630 = Number(document.getElementById("r630Input").value);
  const kurikoshi = Number(document.getElementById("kurikoshiInput").value);
  const carry = Number(document.getElementById("carryInput").value);

  const production = cho + r630;
  const total = production + kurikoshi 
  const shippable = total - carry;

  document.getElementById("productionQty").textContent = production;
  document.getElementById("displayShippable").textContent = shippable;
  document.getElementById("totalshippableQty").textContent = shippable;

  calcShipping();
}

// 曜日ごとの出荷先
const destinations = {
  mon: ["アルク", "北九州", "大分","福岡","Yフーズ"],
  tue: ["大阪","東京","福岡","北九州","大分","マックスバリュ"],
  wed: [],
  thu: ["アルク","福岡","Yフーズ"],
  fri: ["大阪","東京","福岡","北九州","大分","新宿ベジフル"]
};

const specialDest = ["アルク", "Yフーズ", "マックスバリュ", "新宿ベジフル"];

let currentDay = "";

// 曜日選択
function selectDay(day, btn) {
  currentDay = day;

  document.querySelectorAll(".weekday-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");

  updateDestinations(day);
}

// 出荷先表示
function updateDestinations(day) {
  const area = document.getElementById("destArea");

  let html = "";

  destinations[day].forEach((name, index) => {
    html += `
      <div class="dest-row">
        ${name}<br>
        注文数<input type="number" class="dest-input" id="order_${index}"
                    oninput="calcShipping()">
        出荷数<input type="number" class="dest-input" id="ship_${index}"
                    oninput="calcShipping()">
        <span id="rate_${index}" style="margin-left:10px; font-weight:bold;">–</span>
      </div>
    `;
  });

  html += `
    <button onclick="addDestination()"
            style="font-size:20px; padding:10px; margin-top:10px;">
      ＋ 出荷先を追加
    </button>
  `;

  html += `
    <div id="totalRow"
         style="margin-top:20px; padding:12px; background:#fff; border-left:6px solid #2e7d32; border-radius:8px; font-size:22px; font-weight:bold;">
      合計： 注文 <span id="totalOrder">0</span> ／ 出荷 <span id="totalShip">0</span>
      （応諾率 <span id="totalRate">–</span>）
    </div>
  `;

  area.innerHTML = html;
}

// 出荷先追加
function addDestination() {
  const name = prompt("追加する出荷先名を入力してください：");
  if (!name) return;

  destinations[currentDay].push(name);

  updateDestinations(currentDay);
  calcShipping();
}

// 出荷計算
function calcShipping() {
  if (!currentDay) return;

  const total = Number(document.getElementById("totalshippableQty").textContent);
  const destList = destinations[currentDay];

  let orders = [];
  destList.forEach((_, i) => {
    const val = Number(document.getElementById(`order_${i}`)?.value || 0);
    orders.push(val);
  });

  // 固定出荷先（特別扱い + 注文数5以下）
  let fixedShipTotal = 0;

  destList.forEach((name, i) => {
    const orderVal = orders[i];
    const shipInput = document.getElementById(`ship_${i}`);

    if (specialDest.includes(name) || orderVal <= 5) {
      shipInput.value = orderVal;
      fixedShipTotal += orderVal;
    }
  });

  // 案分対象の残数量
  const remainingQty = total - fixedShipTotal;

  // 案分対象の注文合計
  let otherOrderTotal = 0;
  destList.forEach((name, i) => {
    if (!specialDest.includes(name) && orders[i] > 5) {
      otherOrderTotal += orders[i];
    }
  });

  // 案分計算
  let sumShip = fixedShipTotal;

  destList.forEach((name, i) => {
    const shipInput = document.getElementById(`ship_${i}`);
    const orderVal = orders[i];

    if (specialDest.includes(name) || orderVal <= 5) return;

    if (otherOrderTotal === 0) {
      shipInput.value = 0;
      return;
    }

    const ratio = orderVal / otherOrderTotal;
    let shipQty = Math.floor(ratio * remainingQty);

    if (orderVal > 0) {
      shipQty = Math.max(1, shipQty);
      shipQty = Math.min(shipQty, orderVal);
    } else {
      shipQty = 0;
    }

    shipInput.value = shipQty;
    sumShip += shipQty;
  });

  // 残数量
  const leftover = total - sumShip;
  document.getElementById("leftoverQty").textContent = leftover;

  const errorMsg = document.getElementById("errorMsg");
  errorMsg.textContent = leftover < 0
    ? "出荷可能数量が少ないので、手作業で出荷数を調整してください"
    : "";

  // 応諾率（各行）
  destList.forEach((name, i) => {
    const orderVal = Number(document.getElementById(`order_${i}`)?.value || 0);
    const shipVal = Number(document.getElementById(`ship_${i}`)?.value || 0);
    const rateSpan = document.getElementById(`rate_${i}`);

    if (orderVal === 0) {
      rateSpan.textContent = "–";
      rateSpan.style.color = "#2e7d32";
      return;
    }

    let rate = Math.round((shipVal / orderVal) * 100);
    rateSpan.textContent = rate + "%";

    rateSpan.style.color = rate <= 70 ? "#c62828" : "#2e7d32";
  });

  // 合計注文数・合計出荷数・全体応諾率
  let totalOrder = 0;
  let totalShip = 0;

  destList.forEach((name, i) => {
    totalOrder += Number(document.getElementById(`order_${i}`)?.value || 0);
    totalShip += Number(document.getElementById(`ship_${i}`)?.value || 0);
  });

  document.getElementById("totalOrder").textContent = totalOrder;
  document.getElementById("totalShip").textContent = totalShip;

  const totalRateSpan = document.getElementById("totalRate");

  if (totalOrder === 0) {
    totalRateSpan.textContent = "–";
    totalRateSpan.style.color = "#2e7d32";
  } else {
    let totalRate = Math.round((totalShip / totalOrder) * 100);
    totalRateSpan.textContent = totalRate + "%";
    totalRateSpan.style.color = totalRate <= 70 ? "#c62828" : "#2e7d32";
  }
}
</script>

</body>
</html>
